<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>来访人信息</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../../common/css/weui.min.css" />
    <link rel="stylesheet" href="../../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/visitDetail.css?v=0.0.5">
</head>
<body>

    <div id="app" v-cloak>

        <!-- 访客信息 -->
        <div class="visitInfo">
            <div class="info">
                <span>申请状态</span>
                <template v-if="info.approve_status == 1"><span style="color: #FF9430;">待同意</span></template>
                <template v-if="info.approve_status == 2"><span style="color: #44C966;">已同意</span></template>
                <template v-if="info.approve_status == 3"><span style="color: red;">已驳回</span></template>
                <template v-if="info.approve_status == 4"><span style="color: #666;">已失效</span></template>
            </div>
        </div>
        <!-- 访客信息 -->
        <div class="visitInfo">
            <div class="info">
                <span>来访人姓名</span><span>{{info.name}}</span>
            </div>
            <div class="info">
                <span>来访人性别</span><span>{{info.gender == '1'?'男':'女'}}</span>
            </div>
            <div class="info">
                <span>联系电话</span><span>
                <div class="tel">
                    <i><img src="./image/tel.png" alt=""></i>
                    <a :href="'tel:'+info.telephone">{{info.telephone}}</a>
                </div>
                </span>
            </div>
            <div class="info">
                <span>来访时间</span><span>{{info.visit_time}}</span>
            </div>
        </div>
        <!-- 访客信息 -->
        <div class="visitInfo">
            <div class="info">
                <span>来访事由</span><span>{{info.visit_reason}}</span>
            </div>
        </div>
        <!-- 访客信息 -->
        <div class="visitInfo">
            <div class="info2">
                <div class="title">人脸照片</div>
                <div class="uploadImg">
                    <div class="uploaded">
                        <img class="myFaceImg" :src="'data:image/png;base64,'+info.faceData" alt="" @click="watchFaceImg">
                    </div>
                </div>
            </div>
        </div>
        <!-- 按钮 -->
        <template v-if="info.approve_status == 1">
            <div class="btn">
                <span @click="subInfo(1)">驳回</span>
                <span @click="subInfo(0)">同意</span>
            </div>
        </template>

        <div style="width: 100%;height: 30px;"></div>

      
    </div>

</body>
</html>


<!-- 引入 Vue 和 Vant 的 JS 文件 -->
<script type="text/javascript" src="../../common/js/vue.min.js"></script>
<script type="text/javascript" src="../../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../../common/js/base.js"></script>
<script type="text/javascript" src="../../common/js/jssdk.js"></script>
<script type="text/javascript" src="../../common/js/jwxwork.js"></script>
<script type="text/javascript" src="../../common/js/watermark.js?v=1.2"></script>
<script type="text/javascript" src="../../common/js/vConsole.min.js"></script>
<script type="text/javascript" src="../../common/js/server.js"></script>
<script type="text/javascript" src="./js/visitDetail.js?v=0.0.17"></script>
<script>

    // var vConsole = new VConsole();


    //初始化微信社区
    $(function () {
        initJSSDK([ 'hideAllNonBaseMenuItem','invoke','chooseImage','uploadImage','previewImage']);
        wx.ready(function () {
            wx.hideAllNonBaseMenuItem();
        });
    });

    //ios页面回退不刷新
    window.addEventListener('pageshow',function (e) {
        if(e.persisted){
            location.reload();
        }
    });

    function getUserFinish() {
        action();
    }


</script>
<script type="text/javascript" src="../../common/js/getUserInfo.js"></script>
