<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>人脸录入</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../../common/css/weui.min.css" />
    <link rel="stylesheet" href="../../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/enterInfo.css?v=0.0.4">
</head>
<body>

    <div id="app" v-cloak>

        <!-- 录入 -->
        <div class="main">
            <div class="banner"><img src="./image/banner.jpg" alt=""></div>
            <div class="enter">
                <div class="contentIcon"><img src="./image/contentIcon.png" alt=""></div>
                <div class="tips">
                    <div class="tip">
                        <img src="./image/tip1.png" alt=""><span>切勿遮挡脸部</span>
                    </div>
                    <div class="tip">
                        <img src="./image/tip2.png" alt=""><span>切勿拍摄模糊</span>
                    </div>
                    <div class="tip">
                        <img src="./image/tip3.png" alt=""><span>切勿光线太暗</span>
                    </div>
                </div>
            </div>
            <div class="btn">
                <span>开始拍照</span>
                <input name="file" type="file" id="file1" accept="image/*" @change="upload($event)">
            </div>
        </div>


        <!-- 结果 -->
        <van-popup v-model="resultPage" position="left" :style="{width:'100%',height:'100%'}">
            <div class="main1">
                <div class="ct">
                    <div class="resultIcon"><img :src="resultPic"></div>
                    <div class="resultText">{{resultText}}</div>
                    <template v-if="resultText == '人脸核验失败'">
                        <div class="resultText1">请重新拍照上传</div>
                    </template>
                </div>
                <div class="resultBtn" @click="resultBtn">
                    <span>{{resultBtnText}}</span>
                </div>
                <div style="width: 100%;height: 100px;"></div>
            </div>
        </van-popup>

    </div>

</body>
</html>


<!-- 引入 Vue 和 Vant 的 JS 文件 -->

<script type="text/javascript" src="../../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../../common/js/base.js"></script>
<script type="text/javascript" src="../../common/js/jssdk.js"></script>
<script type="text/javascript" src="../../common/js/jwxwork.js"></script>
<script type="text/javascript" src="../../common/js/watermark.js?v=1.2"></script>
<script type="text/javascript" src="../../common/js/vConsole.min.js"></script>
<script type="text/javascript" src="../../common/js/server.js"></script>
<script type="text/javascript" src="../../common/js/compressPhoto.js"></script>
<script type="text/javascript" src="./js/enterInfo.js?v=0.0.25"></script>
<script>

    // var vConsole = new VConsole();


    //初始化微信社区
    $(function () {
        initJSSDK([ 'hideAllNonBaseMenuItem','invoke','chooseImage','uploadImage','previewImage']);
        wx.ready(function () {
            wx.hideAllNonBaseMenuItem();
        });
    });


    function getUserFinish() {
        action();
    }


</script>
