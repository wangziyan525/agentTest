<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>西安银行</title>
    <link rel="stylesheet" href="../common/css/vant-2.12.css">
    <link rel="stylesheet" href="../common/css/weui.min.css">
    <link rel="stylesheet" href="../common/css/weui.min.css">
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css">
    <link rel="stylesheet" href="css/index.css?v=2.0">
</head>
<body style="overflow: hidden">
    <div id="app" style="overflow-y: scroll;height: 100%;display:none">
        <div v-if="list.length>0">
            <div class="listPart" v-for="item in list" >
               
                <div class="listContent">
                    <div class="ListLine">
                        <div>抽奖流水号</div>
                        <div>
                            <div>{{item.TRANS_ID}}</div>
                        </div>
                    </div>
                    <div class="ListLine">
                        <div>客户姓名</div>
                        <div>
                            <div>{{hideName(item.CUST_NAME)}}</div>
                        </div>
                    </div>
                    <div class="ListLine">
                        <div>手机号</div>
                        <div>
                            <img src="images/tel.png" alt="" class="tel">
                            <div @click="bindPhone(item.MOBILE_NO)" style="color:#267EF0">{{item.MOBILE_NO}}</div>
                        </div>
                    </div>
                    <div class="ListLine">
                        <div>抽奖状态</div>
                        <div>
                            <div>{{statusOpt[item.DRAW_STATUS]}}</div>
                        </div>
                    </div>
                    <div class="ListLine">
                        <div>抽奖时间</div>
                        <div>
                            <div>{{item.DRAW_DATE}}</div>
                        </div>
                    </div>
                    <div class="ListLine">
                        <div>领取方式</div>
                        <div>
                            <div>{{getOpt[item.GET_WAY]}}</div>
                        </div>
                    </div>
                    <div class="ListLine">
                        <div>客户零售AUM余额增长值</div>
                        <div>
                            <div>{{item.AUM_PARAM}}</div>
                        </div>
                    </div>
                    <div class="ListLine"  v-if="item.DRAW_STATUS=='3' || item.DRAW_STATUS=='4'">
                        <div>机构名称</div>
                        <div>
                            <div>{{item.ORG_ADDRESS}}</div>
                        </div>
                    </div>
                    <div class="ListLine"  v-if="item.DRAW_STATUS=='2'">
                        <div>邮寄地址</div>
                        <div>
                            <div>{{item.CUST_ADDRESS}}</div>
                        </div>
                    </div>
                </div>
                <div class="notice" @click="goDetail(item.TRANS_ID)" v-if="item.DRAW_STATUS=='3'">确认领取</div>
            </div>
        </div>
        <div v-else class="nodate">
            <div class="noMessage">
                <img src="images/noMessage.png">
            </div>
            暂无数据
        </div>
        <div style="height: 20px;"></div>
        
    </div>
</body>
<script src="../common/js/vue.min.js"></script>
<script src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/base.js?v=202110220"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script src="../common/js/watermark.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script src="./../common/js/server.js?v=20211022"></script>
<script type="text/javascript" src="js/list.js?v=1.1"></script>
<!-- <script src="../common/js/vConsole.min.js"></script> -->
<script type="text/javascript">
    // var vConsole = new VConsole();

    //ios页面回退不刷新
    window.addEventListener('pageshow',function (e) {
        if(e.persisted){
            location.reload();
        }
    });
    function getUserFinish(){
            initJSSDK(['hideAllNonBaseMenuItem','invoke','closeWindow']);

           wx.ready(function() {
               wx.hideAllNonBaseMenuItem();
               WeixinJSBridge.on('menu:setfont', function() {
                    WeixinJSBridge.invoke('setFontSizeCallback', { 'fontSize' : '0' });
                });

           });
           
           // 调用水印
           var username = $.parseJSON($.cookie("user")).name;
           __canvasWM({
               content: username
           });
           initFun()
    }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
</html>
