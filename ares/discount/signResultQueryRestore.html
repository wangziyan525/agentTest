<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
          name="viewport" />
    <title>转贴现买入查询</title>
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="css/signResultQueryRestore.css" />
</head>
<body>
    <div id="app" v-cloak>
        <div class="sign-query-page">
            <div class="sign-query-header">
                <img class="sign-query-statusbar" src="images/signResultQuery-statusbar.png" alt="" aria-hidden="true" />
                <div class="sign-query-navbar">
                    <img class="sign-query-back" src="images/signResultQuery-back.png" alt="返回" @click="goBack" />
                    <div class="sign-query-title">转贴现买入查询</div>
                </div>
                <div class="sign-query-tabs">
                    <div class="sign-query-tab"
                         :class="{ 'is-active': activeTab === 0 }"
                         @click="switchTab(0)">
                        待签收
                    </div>
                    <div class="sign-query-tab"
                         :class="{ 'is-active': activeTab === 1 }"
                         @click="switchTab(1)">
                        签收结果查询
                    </div>
                </div>
            </div>

            <div class="sign-query-filter-bar" v-if="activeTab === 1">
                <button class="sign-query-filter-btn" type="button" @click="showDateSheet = true">
                    <span>{{ dateLabel }}</span>
                    <img class="sign-query-filter-icon" src="images/signResultQuery-arrow-down.png" alt="" />
                </button>
                <button class="sign-query-filter-btn sign-query-filter-btn--right" type="button" @click="showStatusSheet = true">
                    <span>{{ statusLabel }}</span>
                    <img class="sign-query-filter-icon" src="images/signResultQuery-arrow-down.png" alt="" />
                </button>
            </div>

            <div class="sign-query-list">
                <van-list v-model="loading" :finished="finished" finished-text="" :immediate-check="false">
                    <div class="sign-query-card" v-for="(item, index) in displayList" :key="index">
                        <div class="sign-query-card__head">
                            <div class="sign-query-card__head-main">
                                <div class="sign-query-card__bill-no">{{ item.billNo }}</div>
                                <div class="sign-query-card__bill-tag"
                                     :class="item.billType === 'bank' ? 'is-bank' : 'is-commercial'">
                                    {{ item.billType === 'bank' ? '银票' : '商票' }}
                                </div>
                            </div>
                        </div>
                        <div class="sign-query-card__body">
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">报价单编号</span>
                                <span class="sign-query-card__value">{{ item.quoteNo }}</span>
                            </div>
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">票据总数</span>
                                <span class="sign-query-card__value">{{ item.billCount }}</span>
                            </div>
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">票据总金额</span>
                                <span class="sign-query-card__value">{{ item.billAmount }}</span>
                            </div>
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">结算金额</span>
                                <span class="sign-query-card__value">{{ item.settleAmount }}</span>
                            </div>
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">应付利息</span>
                                <span class="sign-query-card__value">{{ item.interestAmount }}</span>
                            </div>
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">交易日期</span>
                                <span class="sign-query-card__value">{{ item.tradeDate }}</span>
                            </div>
                            <div class="sign-query-card__row">
                                <span class="sign-query-card__label">批次状态</span>
                                <span class="sign-query-card__value"
                                      :class="statusClassMap[item.statusCode]">
                                    {{ item.statusText }}
                                </span>
                            </div>
                        </div>
                    </div>
                </van-list>

                <div class="sign-query-empty" v-if="!displayList.length">暂无数据</div>
                <div class="sign-query-bottom-tip" v-if="activeTab === 1 && displayList.length">已到最底部了</div>
            </div>

            <van-action-sheet v-model="showDateSheet"
                              :actions="dateActions"
                              cancel-text="取消"
                              close-on-click-action
                              @select="handleDateSelect" />
            <van-action-sheet v-model="showStatusSheet"
                              :actions="statusActions"
                              cancel-text="取消"
                              close-on-click-action
                              @select="handleStatusSelect" />
        </div>
    </div>
</body>

<script type="text/javascript" src="../common/js/vue.min.js"></script>
<script type="text/javascript" src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script type="text/javascript" src="../common/js/watermark.js"></script>
<script type="text/javascript" src="../common/js/server.js"></script>
<script type="text/javascript" src="js/signResultQueryRestore.js?v=1.0.0"></script>
<!-- <script type="text/javascript" src="../common/js/vConsole.min.js"></script> -->
<script>
    // var vConsole = new VConsole();

    window.addEventListener('pageshow', function(e) {
        if (e.persisted) { location.reload(); }
    });

    $(function() {
        initJSSDK(['hideAllNonBaseMenuItem']);
        wx.ready(function() {
            wx.hideAllNonBaseMenuItem();
        });
    });

    function getUserFinish() {
        var username = $.parseJSON($.cookie("user")).name;
        __canvasWM({ content: username });
        initFun();
    }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
</html>
