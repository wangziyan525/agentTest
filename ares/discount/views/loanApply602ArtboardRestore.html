<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover" name="viewport">
    <title>转贴现卖出查询</title>
    <link rel="stylesheet" href="../css/loanApply602ArtboardRestore.css">
</head>
<body class="loan-apply-602-artboard-page">
    <div class="loan-apply-602-artboard-shell">
        <header class="loan-apply-602-artboard-header">
            <div class="loan-apply-602-artboard-statusbar" aria-hidden="true">
                <div class="loan-apply-602-artboard-statusbar__left">
                    <span class="loan-apply-602-artboard-statusbar__signal"></span>
                    <span class="loan-apply-602-artboard-statusbar__carrier">Sketch</span>
                    <span class="loan-apply-602-artboard-statusbar__wifi"></span>
                </div>
                <div class="loan-apply-602-artboard-statusbar__time">9:41 AM</div>
                <div class="loan-apply-602-artboard-statusbar__right">
                    <span class="loan-apply-602-artboard-statusbar__battery-text">100%</span>
                    <span class="loan-apply-602-artboard-statusbar__battery">
                        <span class="loan-apply-602-artboard-statusbar__battery-cap"></span>
                    </span>
                </div>
            </div>
            <div class="loan-apply-602-artboard-navbar">
                <button class="loan-apply-602-artboard-back" type="button" aria-label="返回"></button>
                <div class="loan-apply-602-artboard-navbar__title">转贴现卖出查询</div>
            </div>
            <div class="loan-apply-602-artboard-tabs" aria-label="页面切换">
                <button class="loan-apply-602-artboard-tabs__item loan-apply-602-artboard-tabs__item--active" type="button">转贴现卖出申请</button>
                <button class="loan-apply-602-artboard-tabs__item" type="button">卖出结果查询</button>
            </div>
        </header>

        <section class="loan-apply-602-artboard-filter" aria-label="筛选条件">
            <button class="loan-apply-602-artboard-filter__item" type="button">
                <span class="loan-apply-602-artboard-filter__text">银票</span>
                <img alt="" class="loan-apply-602-artboard-filter__icon" src="../images/loanApply602-arrow-down.png">
            </button>
            <span class="loan-apply-602-artboard-filter__divider" aria-hidden="true"></span>
            <button class="loan-apply-602-artboard-filter__item" type="button">
                <span class="loan-apply-602-artboard-filter__text">筛选</span>
                <img alt="" class="loan-apply-602-artboard-filter__icon" src="../images/loanApply602-arrow-up.png">
            </button>
        </section>

        <main class="loan-apply-602-artboard-list" id="loanApply602ArtboardList"></main>
    </div>

    <footer class="loan-apply-602-artboard-footer">
        <div class="loan-apply-602-artboard-footer__bar">
            <label class="loan-apply-602-artboard-check loan-apply-602-artboard-check--all">
                <input id="loanApply602ArtboardSelectAll" class="loan-apply-602-artboard-check__input" type="checkbox" checked>
                <span class="loan-apply-602-artboard-check__icon" aria-hidden="true"></span>
                <span class="loan-apply-602-artboard-check__label">全选本页</span>
            </label>
            <div class="loan-apply-602-artboard-footer__count">
                <span id="loanApply602ArtboardSelectedCount">3</span>/<span id="loanApply602ArtboardTotalCount">3</span>
            </div>
        </div>
        <button class="loan-apply-602-artboard-footer__submit" id="loanApply602ArtboardSubmit" type="button">转贴现卖出申请</button>
    </footer>

    <script src="../js/loanApply602ArtboardRestore.js"></script>
</body>
</html>
