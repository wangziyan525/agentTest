<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover" name="viewport">
    <title>转贴现卖出查询</title>
    <link rel="stylesheet" href="../css/loanApply602FreshRestore.css">
</head>
<body class="loan-apply-602-fresh-page">
    <div class="loan-apply-602-fresh-screen">
        <header class="loan-apply-602-fresh-header">
            <div class="loan-apply-602-fresh-statusbar" aria-hidden="true">
                <div class="loan-apply-602-fresh-statusbar__left">
                    <span class="loan-apply-602-fresh-statusbar__signal"></span>
                    <span class="loan-apply-602-fresh-statusbar__carrier">Sketch</span>
                    <span class="loan-apply-602-fresh-statusbar__wifi"></span>
                </div>
                <div class="loan-apply-602-fresh-statusbar__time">9:41 AM</div>
                <div class="loan-apply-602-fresh-statusbar__right">
                    <span class="loan-apply-602-fresh-statusbar__battery-text">100%</span>
                    <span class="loan-apply-602-fresh-statusbar__battery">
                        <span class="loan-apply-602-fresh-statusbar__battery-fill"></span>
                        <span class="loan-apply-602-fresh-statusbar__battery-cap"></span>
                    </span>
                </div>
            </div>
            <div class="loan-apply-602-fresh-navbar">
                <button class="loan-apply-602-fresh-back" type="button" aria-label="返回"></button>
                <div class="loan-apply-602-fresh-navbar__title">转贴现卖出查询</div>
            </div>
            <div class="loan-apply-602-fresh-tabs" aria-label="页面切换">
                <button class="loan-apply-602-fresh-tabs__item loan-apply-602-fresh-tabs__item--active" type="button">转贴现卖出申请</button>
                <button class="loan-apply-602-fresh-tabs__item" type="button">卖出结果查询</button>
            </div>
        </header>

        <section class="loan-apply-602-fresh-filter" aria-label="筛选条件">
            <button class="loan-apply-602-fresh-filter__item" type="button">
                <span>银票</span>
                <img alt="" class="loan-apply-602-fresh-filter__icon" src="../images/loanApply602Fresh-arrow-down.png">
            </button>
            <div class="loan-apply-602-fresh-filter__divider" aria-hidden="true"></div>
            <button class="loan-apply-602-fresh-filter__item" type="button">
                <span>筛选</span>
                <img alt="" class="loan-apply-602-fresh-filter__icon" src="../images/loanApply602Fresh-arrow-up.png">
            </button>
        </section>

        <main class="loan-apply-602-fresh-list" id="loanApply602FreshList"></main>
    </div>

    <footer class="loan-apply-602-fresh-footer">
        <div class="loan-apply-602-fresh-footer__selectbar">
            <label class="loan-apply-602-fresh-check" for="loanApply602FreshSelectAll">
                <input id="loanApply602FreshSelectAll" class="loan-apply-602-fresh-check__input" type="checkbox" checked>
                <span class="loan-apply-602-fresh-check__icon" aria-hidden="true"></span>
                <span class="loan-apply-602-fresh-check__text">全选本页</span>
            </label>
            <div class="loan-apply-602-fresh-footer__count"><span id="loanApply602FreshSelectedCount">3</span>/<span id="loanApply602FreshTotalCount">3</span></div>
        </div>
        <button class="loan-apply-602-fresh-footer__submit" id="loanApply602FreshSubmit" type="button">转贴现卖出申请</button>
    </footer>

    <script src="../js/loanApply602FreshRestore.js"></script>
</body>
</html>
