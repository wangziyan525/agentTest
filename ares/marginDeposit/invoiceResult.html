<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
          name="viewport" />
    <mata http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <title>审批结果</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/applyResult.css?v=0.0.1">

<body>

    <div id="app" style="display:none;" :style="{display:'block'}">

       <!-- banner -->
        <div class="banner">
            <img  v-if="approvalInfo.AUTH_FLAG == '0'" src='./image/pass.png' alt="">
            <img  v-if="approvalInfo.AUTH_FLAG == '1'" src='./image/nopass.png' alt="">
        </div>

        <!-- detail -->
        <div class="detail">
            <div class="list"><span>交易状态</span>
                <template v-if="approvalInfo.AUTH_FLAG == '0'">
                    <span style="color: #1e751e;">审批通过</span>
                </template>
                <template v-if="approvalInfo.AUTH_FLAG == '1'">
                    <span style="color: #f90808;">审批拒绝</span>
                </template>
            </div>
            <div class="list"><span>交易流水号</span><span>{{approvalInfo.WX_SEQ}}</span></div>
            <div class="list"><span>审批时间</span><span>{{approvalInfo.UPDATETIME}}</span></div>
            <div class="list" v-if="approvalInfo.AUTH_FLAG == '1' && approvalInfo.REJECT_REASON && approvalInfo.REJECT_REASON != ''">
                <span>拒绝理由</span>
                <span v-html="approvalInfo.REJECT_REASON" style="word-break: break-all;"></span>
            </div>
        </div>

        <!-- btn -->
        <div class="btn">
            <span class="btnBig" @click="over">完成</span>
        </div>
        <div style="width: 100%;height: 50px;"></div>

    </div>
</body>

</html>
<!-- 引入 Vue 和 Vant 的 JS 文件 -->

<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script type="text/javascript" src="../common/js/jwxwork.js"></script>
<script type="text/javascript" src="../common/js/watermark.js?v=1.2"></script>
<script type="text/javascript" src="../common/js/vConsole.min.js"></script>
<script type="text/javascript" src="../common/js/newServer.js"></script>
<script type="text/javascript" src="./js/invoiceResult.js?v=0.0.51"></script>
<script src="../common/js/server.js"></script>
<script type="text/javascript">

    // var vConsole = new VConsole();

    //ios页面回退不刷新
    window.addEventListener('pageshow',function (e) {
        if(e.persisted){
            location.reload();
        }
    });


    // 初始化微信社区
    deleteShare();
    function deleteShare(){
        initJSSDK([ 'hideAllNonBaseMenuItem','invoke','chooseImage','uploadImage','previewImage']);
        wx.ready(function () {
            wx.hideAllNonBaseMenuItem();
        });
    };

    function getUserFinish() {
        action();
    }


</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
