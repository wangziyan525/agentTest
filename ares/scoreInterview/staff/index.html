<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>员工绩效面谈</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../../common/css/weui.min.css" />
    <link rel="stylesheet" href="../../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/list.css?v=0.0.7">
</head>
<body>

    <div id="app" v-cloak>

        <!-- 搜索 -->
        <div class="searchModel" @click="showChooseTime">
            <input type="text" placeholder="请选择提交年月" v-model="searchYearMonth" readonly>
            <i><img src="./image/xuanzhe.png" alt=""></i>
        </div>

        <!-- 列表 -->
        <div class="mainModel" ref="main" @scroll="handleScroll">
            <template v-if="haveList">
                <template v-for="(it,i) in list">
                    <div class="list" @click="toDetail(it.datastatus,it.id)">
                        <div class="left">
                            <template v-if="it.datastatus==0">
                                <span>{{readYue(it.createtime)}}</span>
                                <span>创建时间：{{readTime1(it.createtime)}}</span>
                                <span v-if="it.responseDeptName && it.responseDeptName != ''">填报部门：{{it.responseDeptName}}</span>
                            </template>
                            <template v-else>
                                <span>{{readYue(it.submitdate)}}</span>
                                <span>提交时间：{{readTime1(it.submitdate)}}</span>
                                <span v-if="it.responseDeptName && it.responseDeptName != ''">填报部门：{{it.responseDeptName}}</span>
                            </template>
                        </div>
                        <div class="right">
                            <span class="type2" v-if="it.datastatus==0">待提交</span>
                            <span class="type2" v-if="it.datastatus == 1">待评分</span>
                            <span class="type2" v-if="it.datastatus == 2">待考核人1评分</span>
                            <span class="type2" v-if="it.datastatus == 3">待考核人2评分</span>
                            <!-- <span class="type1" v-if="it.datastatus == 2 || it.datastatus == 3 || it.datastatus == 4">已评分</span> -->
                            <span class="type1" v-if="it.datastatus == 4">已评分</span>
                        </div>
                    </div>
                </template>
            </template>
            <template v-if="noList">
                <div class="noList">
                    <img src="./image/noList.png" alt="">
                    <span>暂无数据</span>
                </div>
            </template>
        </div>

        <!-- 底部填写按钮 -->
        <template v-if="role == 1">
            <div class="btnModel" v-if="isShowEdit && searchYearMonth == maxDateText">
                <div class="btnBig" @click="toTian">填写绩效面谈情况</div>
            </div>
        </template>
        <template v-if="role == 2">
            <div class="btnModel" v-if="searchYearMonth == maxDateText">
                <div class="btnBig" @click="toTian1">填写绩效面谈情况</div>
            </div>
        </template>
        
    
        <!--时间选择-->
        <van-popup v-model="chooseTimeShow" position="bottom" style="border-radius: 6px;">
            <van-datetime-picker type="year-month"
                                 title="按年月筛选"
                                 v-model="currentDate"
                                 :min-date='minDate'
                                 :max-date='maxDate'
                                 :formatter="formatter"
                                 @cancel="chooseTimeShow=false"
                                 @confirm="chooseDate">
            </van-datetime-picker>
        </van-popup>


    </div>

</body>
</html>


<!-- 引入 Vue 和 Vant 的 JS 文件 -->
<script type="text/javascript" src="../../common/js/vue.min.js"></script>
<script type="text/javascript" src="../../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../../common/js/base.js"></script>
<script type="text/javascript" src="../../common/js/jssdk.js"></script>
<script type="text/javascript" src="../../common/js/jwxwork.js"></script>
<script type="text/javascript" src="../../common/js/watermark.js?v=1.2"></script>
<script type="text/javascript" src="../../common/js/vConsole.min.js"></script>
<script type="text/javascript" src="../../common/js/server.js"></script>
<script type="text/javascript" src="./js/staff.js?v=0.0.26"></script>
<script>

    // var vConsole = new VConsole();


    //初始化微信社区
    $(function () {
        initJSSDK([ 'hideAllNonBaseMenuItem','invoke','chooseImage','uploadImage','previewImage']);
        wx.ready(function () {
            wx.hideAllNonBaseMenuItem();
        });
    });


    function getUserFinish() {
        action();
    }


</script>
