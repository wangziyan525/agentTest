<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>部门</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../../common/css/weui.min.css" />
    <link rel="stylesheet" href="../../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/depDetail.css?v=0.0.7">
</head>
<body>

    <div id="app" v-cloak>

        <!-- 列表 -->
        <div class="mainModel"   ref="main" @scroll="handleScroll">
            <template v-if="haveList">
                <template v-for="(it,i) in list">
                    <!-- 编辑状态 -->
                    <template v-if="isExid">
                        <div class="list" v-if="it.isCanChoosed" @click="toChooseList(i)">
                            <div class="left">
                                <i v-if="it.isChoosed"><img src="./image/choosed.png" alt=""></i>
                                <i v-else><img src="./image/noChosoe.png" alt=""></i>
                                <span>{{it.idcardname}}</span>
                            </div>
                            <div class="right">
                                <span :class="it.datastatus==4?'active2':'active1'">{{it.datastatus==4?'已完成':'未完成'}}</span>
                            </div>
                        </div>
                        <div class="list" style="opacity: .5;" v-else>
                            <div class="left">
                                <span>{{it.idcardname}}</span>
                            </div>
                            <div class="right">
                                <span :class="it.datastatus==4?'active2':'active1'">{{it.datastatus==4?'已完成':'未完成'}}</span>
                            </div>
                        </div>
                    </template>
                    <!-- 非编辑状态 -->
                    <template v-else>
                        <div class="list">
                            <div class="left">
                                <span>{{it.idcardname}}</span>
                            </div>
                            <div class="right">
                                <span :class="it.datastatus==4?'active2':'active1'">{{it.datastatus==4?'已完成':'未完成'}}</span>
                            </div>
                        </div>
                    </template>
                </template>
            </template>
            <template v-if="noList">
                <div class="noList">
                    <img src="./image/noList.png" alt="">
                    <span>暂无数据</span>
                </div>
            </template>
        </div>

        <!-- 底部填写按钮 -->
        <div class="btnModel" v-if="haveList">
            <template v-if="!isExid">
                <div class="bigBtn" @click="isExid=true">导出员工绩效面谈信息</div>
            </template>
            <template v-else>
                <div class="smallBtn" @click="isExid=false">取消</div>
                <div class="smallBtn" @click="toUpDown">确认导出</div>
            </template>
        </div>



    </div>

</body>
</html>


<!-- 引入 Vue 和 Vant 的 JS 文件 -->

<script type="text/javascript" src="../../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../../common/js/base.js"></script>
<script type="text/javascript" src="../../common/js/jssdk.js"></script>
<script type="text/javascript" src="../../common/js/jwxwork.js"></script>
<script type="text/javascript" src="../../common/js/watermark.js?v=1.2"></script>
<script type="text/javascript" src="../../common/js/vConsole.min.js"></script>
<script type="text/javascript" src="../../common/js/server.js"></script>
<script type="text/javascript" src="./js/depDetail.js?v=0.0.20"></script>
<script>

    // var vConsole = new VConsole();


    //初始化微信社区
    $(function () {
        initJSSDK([ 'hideAllNonBaseMenuItem','invoke','chooseImage','uploadImage','previewImage']);
        wx.ready(function () {
            wx.hideAllNonBaseMenuItem();
        });
    });


    function getUserFinish() {
        action();
    }


</script>
