<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
    <title>操作员证件到期审批</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/detail.css?v=0.0.8">
</head>
<body>

    <div id="app" v-cloak>

        <!-- 审批/转办信息 -->
        <template v-if="isApproved">
            <div class="baseInfo">
                <div class="title">审批信息</div>
                <div class="content">
                    <template v-if="isController && infos.handover">
                        <div class="infoRow" style="padding: 5px 12px;">
                            <span style="display: flex;align-items: center;">审批状态</span>
                            <div class="flow" @click="flowPopup=true">
                                <em class="status3">已转办</em>
                                <div class="flowDetail">
                                    查看详情<img src="./image/jinru.png" alt="">
                                </div>
                            </div>
                        </div>
                        <div class="infoRow">
                            <span>转办人名称</span><span>{{infos.handoverName}}</span>
                        </div>
                        <div class="infoRow">
                            <span>转办时间</span><span>{{infos.handoverTime}}</span>
                        </div>
                    </template>
                    <template v-else>
                        <div class="infoRow" style="padding: 5px 12px;">
                            <span style="display: flex;align-items: center;">审批状态</span>
                            <div class="flow" @click="flowPopup=true">
                                <em v-if="infos.pass == 1" class="status1">审批通过</em>
                                <em v-if="infos.pass == 0" class="status2">审批拒绝</em>
                                <div class="flowDetail">
                                    查看详情<img src="./image/jinru.png" alt="">
                                </div>
                            </div>
                        </div>
                        <div v-if="infos.pass == 0" class="infoRow">
                            <span>拒绝原因</span><span v-html="infos.refuseContent"></span>
                        </div>
                        <div class="infoRow">
                            <span>审批时间</span><span>{{infos.approvalTime}}</span>
                        </div>
                    </template>
                </div>
            </div>
        </template>
       

        <!-- 基础信息 -->
        <div class="baseInfo">
            <div class="title">操作员信息</div>
            <div class="content">
                <div class="infoRow">
                    <span>企业名称</span><span>{{infos.companyName}}</span>
                </div>
                <div class="infoRow">
                    <span>操作员名称</span><span>{{infos.operatorName}}</span>
                </div>
                <div class="infoRow">
                    <span>证件号码</span><span>{{infos.idCard}}</span>
                </div>
                <div class="infoRow">
                    <span>证件到期⽇期</span><span>{{infos.newCertificateExpireDate}}</span>
                </div>
                <div class="infoRow">
                    <span>提交时间</span><span>{{infos.submitDate}}</span>
                </div>
            </div>
        </div>

        <div class="baseInfo">
            <div class="title">身份证图⽚</div>
            <div class="idPic">
                <div class="pic">
                    <img class="picter" :src="idCardPicPath1" alt="" @click="watchIdCardPics(0)">
                    <template v-if="isShowGif1">
                        <div class="loadding"><img src="./image/loading-icon.gif" alt=""></div>
                    </template>
                </div>
                <div class="pic">
                    <img class="picter" :src="idCardPicPath2" alt="" @click="watchIdCardPics(1)">
                    <template v-if="isShowGif2">
                        <div class="loadding"><img src="./image/loading-icon.gif" alt=""></div>
                    </template>
                </div>
            </div>
        </div>

    

        <!-- 转办 -->
        <template v-if="isController && !isApproved">
            <div class="passOnModel">
                <div class="passOn" @click="choosePicker(1)">
                    <span>是否转办</span>
                    <input type="text" placeholder="请选择" v-model="isPassOn" readonly>
                    <i><img src="./image/jinru.png" alt=""></i>
                </div>
                <template v-if="isPassOn == '是'">
                    <div class="passOn" @click="choosePicker(2)">
                        <span>转办人名称</span>
                        <input type="text" placeholder="请选择" v-model="passOnPeople" readonly>
                        <i><img src="./image/jinru.png" alt=""></i>
                    </div>
                </template>
            </div>
        </template>
        

        <!-- 提交返回 -->
        <template v-if="!isApproved">
            <div class="btn">
                <template v-if="isController && isPassOn == '是'">
                    <span class="bigBtn" @click="toApproval(2)">确认转办</span>
                </template>
                <template v-else>
                    <span class="smallBtn" @click="toRefuse">拒绝</span>
                    <span class="smallBtn" @click="toApproval(1)">同意</span>
                </template>
            </div>
        </template>
        <template v-else>
            <div class="btn">
                <span class="bigBtn" @click="back">返回</span>
            </div>
        </template>

        <!-- 拒绝弹框 -->
        <van-popup v-model="refusePopup">
            <div class="refuseModel">
                <div class="title">审批拒绝</div>
                <div class="refuseCt">
                    <div class="refuseTip"><em>*</em>请输⼊您要拒绝的原因！（必填）</div>
                    <textarea cols="30" rows="4" placeholder="请输⼊拒绝原因" v-model.trim="reason" maxlength="30"></textarea>
                    <div class="refuseBtn">
                        <span @click="refusePopup=false">取消</span>
                        <span @click="toApproval(0)">确定</span>
                    </div>
                </div>
            </div>
        </van-popup>

        <!-- 下拉选择 -->
        <van-popup v-model="showPicker" position="bottom">
            <van-picker
                    show-toolbar
                    :columns="chooseList"
                    @confirm="onChooseConfirm"
                    @cancel="showPicker=false"
            >
            </van-picker>
        </van-popup>


        <!-- 流转信息弹框 -->
        <van-popup v-model="flowPopup" round position="bottom">
            <div class="flowModel">
                <div class="title">查看审批流程</div>
                <div class="flowCt">
                    <!-- 运营经理 -->
                    <template v-if="isController">
                        <div class="flow">
                            <div class="left"><i><img src="./image/flow.png" alt=""></i></div>
                            <div class="right">
                                <div class="peopleType">运营经理</div>
                                <div class="nameTime">
                                    <div class="name">
                                        <template v-if="infos.handover">
                                            {{infos.handoverName}}
                                            (
                                                <span class="status1">已转办</span>
                                            )
                                        </template>
                                        <template v-else>
                                            {{infos.approvalName}}
                                            (
                                                <span v-if="infos.pass == 1" class="status1">审批通过</span>
                                                <span v-if="infos.pass == 0" class="status2">审批拒绝</span>
                                            )
                                        </template>
                                    </div>
                                    <template v-if="infos.handover">
                                        <div class="time">{{infos.handoverTime}}</div>
                                    </template>
                                    <template v-else>
                                        <div class="time">{{infos.approvalTime}}</div>
                                    </template>
                                </div>
                                <template v-if="infos.refuseContent && infos.refuseContent != '' && !isApproved">
                                    <div class="reason">拒绝原因：<span v-html="infos.refuseContent"></span></div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <!-- 其他 -->
                    <template v-else>
                        <div class="flow">
                            <div class="left"><i><img src="./image/flow.png" alt=""></i></div>
                            <div class="right">
                                <div class="peopleType">运营经理</div>
                                <div class="nameTime">
                                    <div class="name">
                                        {{infos.handoverName}}(<span class="status1">已转办</span>)
                                    </div>
                                    <div class="time">{{infos.handoverTime}}</div>
                                </div>
                            </div>
                        </div>
                        <div class="flow">
                            <div class="left"><i><img src="./image/flow.png" alt=""></i></div>
                            <div class="right">
                                <div class="peopleType">转办审批员</div>
                                <div class="nameTime">
                                    <div class="name">
                                        {{infos.approvalName}}
                                        (
                                            <span v-if="infos.pass == 1" class="status1">审批通过</span>
                                            <span v-if="infos.pass == 0" class="status2">审批拒绝</span>
                                        )
                                    </div>
                                    <div class="time">{{infos.approvalTime}}</div>
                                </div>
                                <template v-if="infos.refuseContent && infos.refuseContent != '' ">
                                    <div class="reason">拒绝原因：<span v-html="infos.refuseContent"></span></div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </van-popup>

    </div>

</body>
</html>


<!-- 引入 Vue 和 Vant 的 JS 文件 -->

<script type="text/javascript" src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script type="text/javascript" src="../common/js/jwxwork.js"></script>
<script type="text/javascript" src="../common/js/watermark.js?v=1.2"></script>
<script type="text/javascript" src="../common/js/vConsole.min.js"></script>
<script type="text/javascript" src="../common/js/server.js"></script>
<script type="text/javascript" src="./js/detail.js?v=20250814242445"></script>

    window.addEventListener('pageshow',function (e) {
        if(e.persisted){
            location.reload();
        }
    });


    //初始化微信社区
    $(function () {
        initJSSDK([ 'hideAllNonBaseMenuItem','invoke','chooseImage','uploadImage','previewImage']);
        wx.ready(function () {
            wx.hideAllNonBaseMenuItem();
        });
    });


    function getUserFinish() {
        action();
    }
