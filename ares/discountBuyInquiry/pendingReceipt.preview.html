                                </div>
                                <div class="amount-divider"></div>
                                <div class="amount-input-wrap">
                                    <span class="amount-prefix">¥</span>
                                    <input v-model="filterForm.maxAmount" class="amount-input" type="text" placeholder="最高金额">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="filter-panel-footer">
