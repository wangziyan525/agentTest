<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
        name="viewport" />
    <mata http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <title>白名单审批管理</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css">
    <link rel="stylesheet" href="./css/style.css?v=1.1.1">
</head>

<body>
    <div id="app" v-cloak>
        <div>
            <div class="index_t displayAround">
                <div @click='statusObj.statusShow=true'>
                    <span>{{statusText}}</span>
                    <img class="down_img" src="./images/down.png" alt="">
                </div>
                <div @click='positionObj.positionShow=true'>
                    <span>{{positionText}}</span>
                    <img class="down_img" src="./images/down.png" alt="">
                </div>
            </div>
           <div v-if='viewFlag'>
            <div class="list_box">
                <div v-if='list.length>0' class="list_t">共<span
                        style="color: #0465FF;font-weight:bold;">{{list.length}}</span>条待审批快E贷申请单</div>
                <div v-if='list.length>0' v-for="(item,index) in list" :key='index'>
                    <div class="list_m displayFlex">
                        <div class="list_m_r" @click='toDetail(item)'>
                            <div>
                               <!-- 1-审批中；2-已审批；-1-已驳回 -->
                                <span>客户姓名</span>
                                <span>
                                    <span>{{item.ClientNm}}</span>
                                    <span v-if='item.AprvSt== 2' class="status_tip status_tip1">已审批</span>
                                    <span v-if='item.AprvSt== 1' class="status_tip status_tip2">审批中</span>
                                    <span v-if='item.AprvSt==-1' class="status_tip status_tip3">已驳回</span>
                                </span>
                            </div>
                            <div>
                                <span>身份证号</span>
                                <span>{{item.IdentNum}}</span>
                            </div>
                            <div>
                                <span>单位名称</span>
                                <span>{{item.UtNm}}</span>
                            </div>
                            <div>
                                <span>职级</span>
                                <span>{{item.Pstn}}</span>
                            </div>
                        </div>
                        <div v-if='item.AprvSt==-1' class="displayEnd">
                            <div style="padding:0 8px;" @click='deleteTap(item,index)'>
                                <img class="more_img" src="./images/delete.png" alt="">
                            </div>
                            <div style="padding-left:9px;" @click='editCustomerTap(item)'>
                                <img class="more_img" src="./images/edit.png" alt="">
                            </div>
                        </div>
                        <div v-else @click='toDetail(item)' class="more_box">
                            <img class="more_img" src="./images/more.png" alt="">
                        </div>
                    </div>
                    <!-- 占位 -->
                    <div style="height:10px;"></div>
                </div>
                <div v-if='list.length==0' class="noData">
                    <img src="./images/noList.png" alt="">
                    <div>暂无数据</div>
                </div>
            </div>
            <!-- 占位 -->
            <div style="height:100px"></div>
            <div class="index_btn">
                <div class="index_add" @click='addCustomerTap()'>新增白名单客户</div>
            </div>
            <!-- 状态选择 -->
            <van-popup v-model="statusObj.statusShow" position="bottom" style="border-radius:8px 8px 0 0;">
                <van-picker show-toolbar :title="statusObj.title" item-height="50px" visible-item-count="3"
                    :columns="statusObj.statusList" @confirm="statusConfirm" @cancel="statusObj.statusShow=false">
                </van-picker>
            </van-popup>
            <!-- 职位选择 -->
            <van-popup v-model="positionObj.positionShow" position="bottom" style="border-radius:8px 8px 0 0;">
                <van-picker show-toolbar :title="positionObj.title" item-height="50px" visible-item-count="3"
                    :columns="positionObj.positionList" @confirm="positionConfirm"
                    @cancel="positionObj.positionShow=false">
                </van-picker>
            </van-popup>
           </div>
        </div>
    </div>
</body>

</html>
<!-- 引入 Vue 的 JS 文件 -->
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/vue.min.js"></script>
<script type="text/javascript" src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script type="text/javascript" src="../common/js/server.js"></script>
<script type="text/javascript" src="./js/index.js?v=1.1.1"></script>
<script type="text/javascript" src="../common/js/watermark.js?v=1.2"></script>
<!-- <script type="text/javascript" src="../common/js/vConsole.min.js"></script> -->
<script>
    // var vConsole = new VConsole();
    //初始化微信社区
    $(function () {
            initJSSDK(['hideAllNonBaseMenuItem', 'invoke', 'closeWindow']);
            wx.ready(function () {
                wx.hideAllNonBaseMenuItem();
            });
        });
        function getUserFinish() {
            // 调用水印
            var username = $.parseJSON($.cookie("user")).name;
            __canvasWM({
                content: username
            });
            initFun();
        }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
