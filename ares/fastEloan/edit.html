<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
        name="viewport" />
    <mata http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <title>新增白名单客户信息</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css">
    <link rel="stylesheet" href="./css/style.css?v=1.0.2">
</head>

<body>
    <div id="app" v-cloak>
        <div v-if='flag=="edit"' class="edit_t">
            <div style="padding: 10px 0;box-sizing: border-box;">驳回意见</div>
            <div class="edit_text">请参照补录规范（可点击 [指引入口] 查看），针对上述问题完善后重新提交。感谢配合。</div>
        </div>
        <div style="height: 10px;"></div>
        <div class="edit_m">
            <div class="edit_item displayStart lineBottom">
                <span class="edit_m_l displayStart">
                    <span class="color666">客户姓名</span>
                    <span style="color: #FF4D4F;font-size:20px">*</span>
                </span>
                <input type="text" placeholder="请输入" v-model='custObj.ClientNm'>
            </div>
            <div class="edit_item displayStart lineBottom">
                <span class="edit_m_l displayStart">
                    <span class="color666">身份证号</span>
                    <span style="color: #FF4D4F;font-size:20px">*</span>
                </span>
                <input type="text" placeholder="请输入" v-model='custObj.IdentNum'>
            </div>
            <div class="edit_item displayStart lineBottom">
                <span class="edit_m_l displayStart">
                    <span class="color666">单位名称</span>
                    <span style="color: #FF4D4F;font-size:20px">*</span>
                </span>
                <textarea class="edit_textarea" placeholder="请输入" v-model="custObj.UtNm" :style='{height:textH}' autosize
                    @input='handleTextH'></textarea>
            </div>
            <div class="edit_item" v-if='positionList.length>0'>
                <span class="edit_m_l displayStart">
                    <span class="color666">职级</span>
                    <span style="color: #FF4D4F;font-size:20px">*</span>
                </span>
                <div class="edit_position displayFlex">
                    <div v-for='(item,index) in positionList' :key='index'
                        :class='positionVal==item.val?"edit_position_active":""' @click='selectPosition(item)'>
                        <span>{{item.text}}</span>
                        <img v-if='positionVal==item.val' class="select_p" src="./images/postion_a.png" alt="">
                    </div>
                </div>
            </div>
        </div>
        <!-- 占位 -->
        <div style="height:100px"></div>
        <div class="edit_btn displayFlex">
            <span @click='cancelTap'>取消</span>
            <span @click='peopleShowTap'>提交</span>
        </div>
        <!-- 审核人选择 -->
        <van-popup v-model="peopleObj.peopleShow" position="bottom" style="border-radius:8px 8px 0 0;">
            <van-picker show-toolbar :title="peopleObj.title" item-height="50px" visible-item-count="3"
                :columns="peopleObj.peopleList" @confirm="peopleConfirm" @cancel="peopleObj.peopleShow=false">
            </van-picker>
        </van-popup>
    </div>
</body>

</html>
<!-- 引入 Vue 的 JS 文件 -->
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/vue.min.js"></script>
<script type="text/javascript" src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script type="text/javascript" src="../common/js/server.js"></script>
<script type="text/javascript" src="./js/idCardCheck.js"></script>
<script type="text/javascript" src="./js/edit.js?v=1.1.5"></script>
<script type="text/javascript" src="../common/js/watermark.js?v=1.2"></script>
<!-- <script type="text/javascript" src="../common/js/vConsole.min.js"></script> -->
<script>
    // var vConsole = new VConsole();
    //初始化微信社区
    $(function () {
            initJSSDK(['hideAllNonBaseMenuItem', 'invoke','closeWindow']);
            wx.ready(function () {
                wx.hideAllNonBaseMenuItem();
            });
        });
    function getUserFinish() {
            // 调用水印
            var username = $.parseJSON($.cookie("user")).name;
            __canvasWM({
                content: username
            });
            initFun();
        }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
