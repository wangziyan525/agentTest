<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
        name="viewport" />
    <link rel="stylesheet" href="../common/css/weui.min.css">
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css">
    <link rel="stylesheet" href="../common/css/vant-2.12.css">
    <link rel="stylesheet" href="css/common.css?v=1.0.0">
    <link rel="stylesheet" href="css/index.css?v=1.0.4">
    <title></title>
</head>

<body>
    <div id="app" v-cloak>
        <!-- 占位 -->
        <div style="height:10px;"></div>
        <!-- 新增银行 -->
        <div v-if='flag==0'>
            <div class="addBank_box">
                <div class="addBank_item display_flex lineBottom">
                    <span style="font-weight:600;">银行名称</span>
                    <span :style="bankObj.memberBankName?'':'color:#999'" @click='toSearchTap()'>{{bankObj.memberBankName?bankObj.memberBankName:'请选择'}}</span>
                </div>
                <div class="addBank_item display_flex">
                    <span style="font-weight:600;">银行档位</span>
                    <div @click='gradeShow=true'>
                        <input type="text" placeholder="请选择" v-model='gradeText' readonly>
                        <img src="./images/more.png" class="more_img" alt="">
                    </div>
                </div>
            </div>
            <div class="finished_footer">
                <span style="color: #3199DD;" @click='backTap()'>返回</span>
                <span style="color: #FFFFFF;background: #3199DD;" @click='addBankTap(1)'>保存</span>
            </div>
        </div>
        <!-- 修改银行 -->
        <div v-if='flag==1'>
            <div class="addBank_box">
                <div class="addBank_item display_flex lineBottom">
                    <span style="font-weight:600;">银行名称</span>
                    <span style="color: #999999;">{{bankObj.memberBankName}}</span>
                </div>
                <div class="addBank_item display_flex">
                    <span style="font-weight:600;">银行档位</span>
                    <div @click='gradeShow=true'>
                        <input type="text" placeholder="请选择" v-model='gradeText' readonly>
                        <img src="./images/more.png" class="more_img" alt="">
                    </div>
                </div>
            </div>
            <div class="finished_footer">
                <span style="color: #FF573F;border: 1px solid #FF573F;" @click='deleteTap()'>删除</span>
                <span style="color: #FFFFFF;background: #3199DD;" @click='addBankTap(1)'>保存</span>
            </div>
        </div>
        <!-- 银行挡位选择 -->
        <div>
            <van-popup v-model='gradeShow' position="bottom" @click-overlay="gradeShow=false"
                :close-on-click-overlay="false" style="background: transparent;">
                <div class="add_grade_box">
                    <div class="add_grade_title lineBottom">
                        <span>选择银行档位</span>
                        <img class="gradeClose_img" src="./images/close.png" @click='gradeHide()' alt="">
                    </div>
                    <div class="add_grade_info">
                        <div class="display_start">
                            <span v-for="(item,index) in gradeList" :key='index'
                                :class="selectIndex==index+1?'add_grade_active':''"
                                @click='gradeSelectTap(index)'>{{item.text}}</span>
                        </div>
                    </div>
                </div>
            </van-popup>
        </div>
    </div>
</body>
<script type="text/javascript" src="../common/js/vue.min.js"></script>
<script type="text/javascript" src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script src="../common/js/watermark.js"></script>
<script src="../common/js/server.js"></script>
<script src="js/common.js?v=1.0.2"></script>
<script src="js/addBank.js?v=1.0.8"></script>
<!-- <script src='../common/js/vConsole.min.js'></script> -->
<script>
    // var vConsole = new VConsole();
    initJSSDK(['hideAllNonBaseMenuItem'])
    wx.ready(function() {
        wx.hideAllNonBaseMenuItem();
    });
    function getUserFinish() {
        var username = $.parseJSON($.cookie("user")).name;
        __canvasWM({
            content: username
        });
        initFun()
    }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>

</html>
