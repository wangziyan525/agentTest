<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
        name="viewport" />
    <link rel="stylesheet" href="../common/css/weui.min.css">
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css">
    <link rel="stylesheet" href="css/common.css?v=1.0.0">
    <link rel="stylesheet" href="css/index.css?v=1.0.1">
    <title>BP值管理</title>
</head>

<body>
    <div id="app" v-cloak>
        <!-- 占位 -->
        <div style="height:10px;"></div>
        <div v-if='bpList.length>0'>
            <div class="bp_box">
                <div style="margin-bottom:10px;">
                    <div class="gradeList_m_t display_start">
                        <span>票面金额BP值</span>
                        <span style="font-size:12px;
                        color: #999999;font-weight:400">（票面金额区间范围内上浮BP值管理）</span>
                    </div>
                    <div class="bp_con">
                        <div class="bp_con_item display_flex lineBottom">
                            <span>0-50万</span>
                            <div>
                                <input type="number" v-model='bpList[0].bpValue' :readonly='eidtFlag==0?true:false'>
                                <span>BP</span>
                            </div>
                        </div>
                        <div class="bp_con_item display_flex">
                            <span>50万-100万</span>
                            <div>
                                <input type="number" v-model='bpList[1].bpValue' :readonly='eidtFlag==0?true:false'>
                                <span>BP</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="gradeList_m_t display_start">
                        <span>银行档位BP值</span>
                        <span style="font-size:12px;
                        color: #999999;font-weight:400">（银行档位基于上一档位上浮BP值管理）</span>
                    </div>
                    <div class="bp_con">
                        <div v-for='(item,index) in bpList' :key='index' v-if='index>1' :class="bpList.length-1==index?'bp_con_item display_flex':'bp_con_item display_flex lineBottom'">
                            <span>{{numToChinese(item.bpType-1)}}档</span>
                            <div>
                                <input type="number" v-model='item.bpValue' :readonly='eidtFlag==0?true:false'>
                                <span>BP</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="finished_footer">
                <span style="color: #3199DD;" @click='backTap()'>返回</span>
                <span style="color: #FFFFFF;background: #3199DD;" @click='saveBP()'>提交</span>
            </div>
        </div>
    </div>
</body>
<script type="text/javascript" src="../common/js/vue.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script src="../common/js/server.js"></script>
<script src="js/common.js"></script>
<script src="js/managementBP.js?v=1.0.8"></script>
<script src="../common/js/watermark.js"></script>
<!-- <script src='../common/js/vConsole.min.js'></script> -->
<script>
    // var vConsole = new VConsole();
    initJSSDK(['hideAllNonBaseMenuItem'])
    wx.ready(function() {
        wx.hideAllNonBaseMenuItem();
    });
    function getUserFinish() {
        var username = $.parseJSON($.cookie("user")).name;
        __canvasWM({
            content: username
        });
        initFun()
    }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
</html>
