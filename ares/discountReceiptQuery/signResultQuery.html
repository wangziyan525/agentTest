<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
          name="viewport" />
    <title>转贴现买入查询</title>
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="css/signResultQuery.css">
</head>
<body>
    <div id="app" v-cloak>
        <div class="receipt-query-page">
            <div class="page-header">
                <img class="status-bar" src="images/statusbar.png" alt="">
                <div class="nav-bar">
                    <div class="back-hit" @click="goBack">
                        <img class="back-icon" src="images/back.png" alt="">
                    </div>
                    <div class="nav-title">转贴现买入查询</div>
                </div>
                <div class="tab-bar">
                    <div class="tab-item" :class="{ active: activeTab === 0 }" @click="switchTab(0)">待签收</div>
                    <div class="tab-item" :class="{ active: activeTab === 1 }" @click="switchTab(1)">签收结果查询</div>
                    <div class="tab-line" :style="tabLineStyle"></div>
                </div>
            </div>

            <div class="toolbar">
                <div class="filter-control" @click="openDateSheet">
                    <span>{{ selectedDate }}</span>
                    <img class="filter-arrow" src="images/arrow-down.png" alt="">
                </div>
                <div class="filter-control filter-control-right" @click="openStatusSheet">
                    <span>筛选</span>
                    <img class="filter-arrow" src="images/arrow-down.png" alt="">
                </div>
            </div>

            <div class="result-list" v-if="filteredList.length">
                <div class="result-card" v-for="(item, index) in filteredList" :key="item.billNo + '-' + index">
                    <div class="card-header">
                        <div class="card-title-row">
                            <span class="bill-no">{{ item.billNo }}</span>
                            <span class="ticket-tag" :class="'ticket-tag-' + item.typeTheme">{{ item.ticketType }}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="detail-row" v-for="(detail, detailIndex) in item.details" :key="item.billNo + '-detail-' + detailIndex">
                            <span class="detail-label">{{ detail.label }}</span>
                            <span class="detail-value" :style="{ color: detail.color || '#272727' }">{{ detail.value }}</span>
                        </div>
                    </div>
                </div>
                <div class="list-footer">已到最底部了</div>
            </div>

            <div class="empty-state" v-else>
                <div class="empty-text">暂无符合条件的数据</div>
            </div>

            <van-action-sheet
                v-model="showDateSheet"
                :actions="dateActions"
                cancel-text="取消"
                close-on-click-action
                @select="onDateSelect">
            </van-action-sheet>
            <van-action-sheet
                v-model="showStatusSheet"
                :actions="statusActions"
                cancel-text="取消"
                close-on-click-action
                @select="onStatusSelect">
            </van-action-sheet>
        </div>
    </div>
</body>

<script type="text/javascript" src="../common/js/vue.min.js"></script>
<script type="text/javascript" src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script type="text/javascript" src="../common/js/watermark.js"></script>
<script type="text/javascript" src="../common/js/server.js"></script>
<script type="text/javascript" src="js/signResultQuery.js?v=1.0.0"></script>
<script>
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) { location.reload(); }
    });

    $(function() {
        initJSSDK(['hideAllNonBaseMenuItem', 'invoke', 'closeWindow']);
        wx.ready(function() {
            wx.hideAllNonBaseMenuItem();
        });
    });

    function getUserFinish() {
        var username = $.parseJSON($.cookie('user')).name;
        __canvasWM({ content: username });
        initFun();
    }
</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
</html>
