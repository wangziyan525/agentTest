<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
          name="viewport" />
    <mata http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <title>资本境内付</title>
    <!-- head 中 -->
    <link rel="stylesheet" href="../common/css/weui.min.css" />
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css" />
    <link rel="stylesheet" href="../common/css/vant-2.12.css" />
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/applyResult.css?v=0.0.1">

<body>

    <div id="app" style="display:none;" :style="{display:'block'}">

       <!-- banner -->
        <div class="banner">
            <img  v-if="approvedInfos.ISPASS == 'Y'" src='./image/pass.png' alt="">
            <img  v-if="approvedInfos.ISPASS == 'N'" src='./image/nopass.png' alt="">
        </div>

        <!-- detail -->
        <div class="detail">
            <div class="list"><span>交易状态</span>
                <template v-if="approvedInfos.ISPASS == 'Y'">
                    <span style="color: green;">审批通过</span>
                </template>
                <template v-if="approvedInfos.ISPASS == 'N'">
                    <span style="color: red;">审批拒绝</span>
                </template>
            </div>
            <div class="list"><span>交易流水号</span><span>{{TRAN_SEQ}}</span></div>
            <div class="list"><span>审批时间</span><span>{{approvedInfos.SUBMIT_TIME}}</span></div>
            <div class="list" v-if="approvedInfos.ISPASS == 'N' && approvedInfos.REFUSED_MSG && approvedInfos.REFUSED_MSG != ''">
                <span>拒绝理由</span>
                <span v-html="approvedInfos.REFUSED_MSG" style="word-break: break-all;"></span>
            </div>
        </div>

        <!-- btn -->
        <div class="btn">
            <span class="btnBig" @click="over">完成</span>
        </div>
        <div style="width: 100%;height: 50px;"></div>

    </div>
</body>

</html>
