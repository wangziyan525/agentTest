<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover"
        name="viewport" />
    <link rel="stylesheet" href="../common/css/weui.min.css">

    <title>提交结果</title>

<body>
    <div class="container" v-cloak>
        <div class="topArea">
            <img class="topImg" src="./images/success.png" alt="">
            <div>提交成功</div>
        </div>
        <div class="midArea">
            <div>温馨提示</div>
            <div class="midtext">
                <p>1、在您申请完成后，系统将此信息推送至支行长、总行零售部管理专员线上审核，审核通过后自动上报中国银保监会备案；</p>
                <p>2、请您及时关注企业微信“金融小站”版块中的相关推送信息；</p>
                <p>3、根据中国银保监会要求，在备案时需本人手机下载“金事通APP”，并完成相关信息核实。</p>
            </div>
        </div>
        <div class="btmBtn" @click="toHomePage">
            确定
        </div>
    </div>

</body>

     //var vConsole = new VConsole();

        wx.hideAllNonBaseMenuItem();
    });

        initFun()
