<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>保险资格备案审查</title>
    <link rel="stylesheet" href="../common/css/vant-2.12.css">
    <link rel="stylesheet" href="../common/css/weui.min.css">
    <link rel="stylesheet" href="../common/css/weui.min.css">
    <link rel="stylesheet" href="../common/css/jquery-weui.min.css">
    <link rel="stylesheet" href="css/logoutList.css?v=1.0">
</head>
<body >
    <div id="app" style="overflow-y: scroll;height: 100%;" v-cloak>
        <div class="listTopPart">
            <div class="listOneLine">
                <img src="images/search.png" style="width: 14px; height: 14px;padding-left: 8px;">
                <div class="keyInput">                    
                    <van-field type="text" v-model="placetext" placeholder="请输入姓名" maxlength="10" ></van-field>
                </div>
                <div class="keySearchBtn" @click="search(placetext)">搜索</div>
            </div>
            
        </div>
        <van-list>
        <div  v-if = "tabsDataList.length>0" class="listScroll" style="overflow-y: auto;margin-top: 10px" v-for="(item, index) in tabsDataList">
            <div class="listArea">
                <div class="divider"></div>
                <div style="display: flex;flex-direction: row;justify-content: space-between">
                    <div class="leftArea">
                        <div>{{item.name}}</div>
                        <div>证件号码：{{item.idc}}</div>
                    </div>
                    <div class="rightArea" @click="logout(item)">
                        <div class="rightAreaBt">注销</div>
                    </div>
                </div>
            </div>      
        </div>
    </van-list>
    <div class="" v-if="moreStatus" @click="addMore()" style="color:#377ae6;text-align: center;padding-bottom: 10px;box-sizing: border-box;font-size: 15px">----点击加载更多----</div>
        <div class="" v-if="noMoreStatus" style="color:#999;text-align: center;padding-bottom: 10px;box-sizing: border-box;font-size: 15px">----没有更多数据了----</div>
    
         <div  class="nodate" v-if="nodata">
            <div class="noMessage">
                <img src="images/noList.png">
            </div>
            暂无数据
        </div> 


    </div>
</body>
<script src="../common/js/vue.min.js"></script>
<script src="../common/js/vant-2.12.min.js"></script>
<script type="text/javascript" src="../common/js/base.js"></script>
<script type="text/javascript" src="../common/js/jquery-2.1.3.min.js"></script>
<script type="text/javascript" src="../common/js/jquery-weui.min.js"></script>
<script type="text/javascript" src="../common/js/jquery.cookie_jq.js"></script>
<script src="../common/js/watermark.js"></script>
<script type="text/javascript" src="../common/js/jssdk.js"></script>
<script src="./../common/js/server.js"></script>
<script type="text/javascript" src="js/logoutList.js"></script>
<script src="../common/js/vConsole.min.js"></script> 
<script type="text/javascript">
    // var vConsole = new VConsole();
    
    function getUserFinish(){
            initJSSDK(['hideAllNonBaseMenuItem','invoke','closeWindow']);
            //ios页面回退不刷新
            window.addEventListener('pageshow',function (e) {
                if(e.persisted){
                    location.reload();
                }
            });
           wx.ready(function() {
               wx.hideAllNonBaseMenuItem();
               WeixinJSBridge.on('menu:setfont', function() {
                    WeixinJSBridge.invoke('setFontSizeCallback', { 'fontSize' : '0' });
                });

           });
           // 调用水印
           var username = $.parseJSON($.cookie("user")).name;
           __canvasWM({
               content: username
           });
           initFun()
    }

</script>
<script type="text/javascript" src="../common/js/getUserInfo.js"></script>
</html>
